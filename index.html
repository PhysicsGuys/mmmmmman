<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Random Number</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background-color 0.3s;
    }
    #number {
      font-family: Arial Black, sans-serif;
      font-size: 80vmin;
      font-weight: 900;
      color: white;
      line-height: 1;
      user-select: none;
    }
    #other-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 8px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
      z-index: 10;
    }
    #other-btn:hover { background: rgba(255,255,255,0.35); }

    /* Video overlay */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: black;
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #overlay.visible { display: flex; }
    #vid {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
    #close-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 8px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
      z-index: 110;
    }
    #close-btn:hover { background: rgba(255,255,255,0.35); }
  </style>
</head>
<body>

<div id="number">1</div>
<button id="other-btn" onclick="openVideo()">other thing</button>

<!-- Video overlay -->
<div id="overlay">
  <video id="vid" src="random_numbers_1hr.mp4" autoplay controls></video>
  <button id="close-btn" onclick="closeVideo()">← go back</button>
</div>

<script>
  const colors = { 1: '#8B0000', 2: '#006400', 3: '#00008B', 4: '#FF8C00' };

  function getNext(current) {
    const roll = Math.floor(Math.random() * 11) + 1;
    if (roll === 1) return current;
    if (roll === 2) return ((current - 2 + 4) % 4) + 1;
    return Math.floor(Math.random() * 4) + 1;
  }

  let current = Math.floor(Math.random() * 4) + 1;

  function update() {
    document.getElementById('number').textContent = current;
    document.body.style.backgroundColor = colors[current];
    current = getNext(current);
  }

  update();
  setInterval(update, 9000);

  function openVideo() {
    document.getElementById('overlay').classList.add('visible');
    document.getElementById('vid').play();
  }

  function closeVideo() {
    document.getElementById('overlay').classList.remove('visible');
    document.getElementById('vid').pause();
  }
</script>
</body>
</html>
