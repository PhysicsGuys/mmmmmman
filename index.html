<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Random Number</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background-color 0.2s;
    }

    #number {
      font-family: Arial Black, sans-serif;
      font-size: 80vmin;
      font-weight: 900;
      color: white;
      line-height: 1;
      user-select: none;
    }

    #other-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 8px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
      z-index: 10;
    }
    #other-btn:hover { background: rgba(255,255,255,0.35); }
  </style>
</head>
<body>

  <div id="number">1</div>
  <button id="other-btn" onclick="toggleSpeed()">other thing</button>

<script>
  const colors = { 1: '#8B0000', 2: '#006400', 3: '#00008B', 4: '#FF8C00' };

  function getNext(current) {
    const roll = Math.floor(Math.random() * 11) + 1;
    if (roll === 1) return current;                       // 1/11 same
    if (roll === 2) return ((current - 2 + 4) % 4) + 1; // 1/11 one before
    return Math.floor(Math.random() * 4) + 1;            // 9/11 random
  }

  let current = Math.floor(Math.random() * 4) + 1;
  let fastMode = false;
  let intervalId = null;

  function update() {
    current = getNext(current);
    document.getElementById('number').textContent = current;
    document.body.style.backgroundColor = colors[current];
  }

  function startTimer(ms) {
    if (intervalId) clearInterval(intervalId);
    intervalId = setInterval(update, ms);
  }

  function toggleSpeed() {
    fastMode = !fastMode;
    if (fastMode) {
      document.getElementById('other-btn').textContent = '← go back';
      startTimer(1700); // other thing: 1.7 seconds
    } else {
      document.getElementById('other-btn').textContent = 'other thing';
      startTimer(9000); // normal: 9 seconds
    }
  }

  // Init at 9 seconds
  document.getElementById('number').textContent = current;
  document.body.style.backgroundColor = colors[current];
  startTimer(9000);
</script>
</body>
</html>
